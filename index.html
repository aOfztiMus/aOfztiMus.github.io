<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าหลัก</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        p {
            color: #555;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .button {
            display: inline-block;
            padding: 12px 24px;
            text-decoration: none;
            background-color: #3498db;
            color: #fff;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #2980b9;
        }

        .highlight {
            color: #e67e22;
            font-weight: bold;
        }

        /* เพิ่มลูกเล่น Animation เล็กน้อย */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            animation: fadeIn 0.8s ease-out;
        }

        .button {
            animation: fadeIn 1s ease-out forwards;
            opacity: 0;
        }

        .button:nth-child(1) {
            animation-delay: 0.2s;
        }

        .button:nth-child(2) {
            animation-delay: 0.4s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ยินดีต้อนรับสู่เว็บไซต์ของเรา</h1>
        <p>พบกับเนื้อหาที่น่าสนใจและอัปเดตใหม่ๆ <span class="highlight">อยู่เสมอ</span></p>
        <div class="button-group">
            <a href="#" class="button">เรียนรู้เพิ่มเติม</a>
            <a href="#" class="button">ติดต่อเรา</a>
        </div>
    </div>
</body>
</html>
