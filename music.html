<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เครื่องเล่นเพลงสวยๆ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="music-player">
        <div class="cover">
            <img id="album-cover" src="default-cover.jpg" alt="Album Cover">
        </div>
        <div class="info">
            <h3 id="song-title">ชื่อเพลง</h3>
            <p id="artist">ชื่อศิลปิน</p>
        </div>
        <div class="progress-area">
            <div class="current-time">0:00</div>
            <div class="progress-bar">
                <input type="range" id="progress" value="0" max="100">
            </div>
            <div class="duration">0:00</div>
        </div>
        <div class="controls">
            <button id="prev"><i class="fas fa-backward"></i></button>
            <button id="play-pause">
                <i class="fas fa-play play-icon"></i>
            </button>
            <button id="next"><i class="fas fa-forward"></i></button>
        </div>
        <div class="volume-control">
            <i class="fas fa-volume-up"></i>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
        </div>
        <audio id="audio" src="your-music.mp3"></audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
